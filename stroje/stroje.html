<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Stroje</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Strój szkolny</h1>
        <p>Opis ubioru ucznia i nauczyciela w szkole</p>
    </header>
    <main>
        <div id="student">
            <img src="student.png" alt="Obraz ucznia">
            <p>Ważne, żeby uczeń nie przychodził do szkołu nago, a tak to strój powinien być schludny i wygodny. W naszej szkole strój ucznia jest określany przez <a href="https://www.sltzn.katowice.pl/images/dokumenty/statut_technikum.pdf" target="_blank">statut</a>.</p>
        </div>
        <div id="teacher">
            <img src="teacher.png" alt="Obraz nauczyciela">
            <p>Tak samo jak u ucznia strój powinien być schludny i wygodny.</p>
        </div>
    </main>
    <footer>
        <p>Wykonał 18</p>
    </footer>
</body>
</html>
